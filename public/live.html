<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>直播播放</title>
    <style>
        body {
            margin: 0;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        #video {
            width: 100%;
            max-width: 1280px;
        }
    </style>
</head>
<body>
<video id="video" autoplay controls muted playsinline></video>
<script src="https://cdn.jsdelivr.net/npm/hls.js@1.4.12"></script>
<script>
    const video = document.getElementById('video');
    if (Hls.isSupported()) {
        const hls = new Hls({ autoStartLoad: true });
        hls.loadSource('http://8.129.135.140:8888/live/1581F7FVC252A00CJ5TT-88-0-0/index.m3u8');
        hls.attachMedia(video);
    } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
        video.src = 'http://8.129.135.140:8888/live/1581F7FVC252A00CJ5TT-88-0-0/index.m3u8';
    }
</script>
</body>
</html>
